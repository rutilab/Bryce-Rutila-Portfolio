<svg width="196" height="283" viewBox="0 0 432 624" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
    <style>
      .flame-outer {
        transform-origin: 197px 393px;
        animation:
          flameWobble 1.6s ease-in-out infinite alternate,
          flameFlicker 0.35s ease-in-out infinite alternate;
        filter: drop-shadow(0 8px 18px rgba(254,122,10,0.7));
      }
      .flame-mid {
        transform-origin: 197px 393px;
        animation:
          flameMidWobble 1.3s ease-in-out infinite alternate,
          flameFlickerMid 0.4s ease-in-out infinite alternate;
        filter: drop-shadow(0 4px 10px rgba(254,206,1,0.55));
      }
      .flame-inner {
        transform-origin: 197px 393px;
        animation:
          flameInnerWobble 1s ease-in-out infinite alternate,
          flameFlickerInner 0.28s ease-in-out infinite alternate;
        filter: drop-shadow(0 2px 6px rgba(254,241,132,0.6));
      }
      @keyframes flameWobble {
        0%   { transform: scaleX(1) scaleY(1) skewX(0deg); }
        25%  { transform: scaleX(1.06) scaleY(0.97) skewX(1.5deg); }
        50%  { transform: scaleX(0.96) scaleY(1.04) skewX(-1deg); }
        75%  { transform: scaleX(1.04) scaleY(0.98) skewX(2deg); }
        100% { transform: scaleX(1.02) scaleY(1.02) skewX(-0.5deg); }
      }
      @keyframes flameFlicker {
        0% { opacity: 1; } 40% { opacity: 0.88; } 70% { opacity: 0.95; } 100% { opacity: 0.82; }
      }
      @keyframes flameMidWobble {
        0%   { transform: scaleX(1) scaleY(1) skewX(0deg); }
        30%  { transform: scaleX(0.94) scaleY(1.06) skewX(-2deg); }
        65%  { transform: scaleX(1.07) scaleY(0.95) skewX(1.5deg); }
        100% { transform: scaleX(0.97) scaleY(1.03) skewX(-1deg); }
      }
      @keyframes flameFlickerMid {
        0% { opacity: 1; } 35% { opacity: 0.84; } 70% { opacity: 0.93; } 100% { opacity: 0.78; }
      }
      @keyframes flameInnerWobble {
        0%   { transform: scaleX(1) scaleY(1) skewX(0deg); }
        20%  { transform: scaleX(1.08) scaleY(0.93) skewX(2.5deg); }
        55%  { transform: scaleX(0.93) scaleY(1.08) skewX(-2deg); }
        80%  { transform: scaleX(1.05) scaleY(0.97) skewX(1deg); }
        100% { transform: scaleX(0.97) scaleY(1.05) skewX(-1.5deg); }
      }
      @keyframes flameFlickerInner {
        0% { opacity: 1; } 30% { opacity: 0.75; } 60% { opacity: 0.92; } 100% { opacity: 0.68; }
      }
    </style>
  </defs>



<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f5f5f5;
    }
  </style>
</head>
<body>
<svg width="256" height="256" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .yellow-tri {
      transform-box: fill-box;
      transform-origin: 50% 100%;
      animation: compass-teeter 6s ease-in-out infinite;
    }

    @keyframes compass-teeter {
      0%   { transform: rotate(0deg); }
      8%   { transform: rotate(14deg); }
      22%  { transform: rotate(-10deg); }
      36%  { transform: rotate(6deg); }
      48%  { transform: rotate(-3.5deg); }
      58%  { transform: rotate(1.5deg); }
      67%  { transform: rotate(-0.5deg); }
      74%  { transform: rotate(0deg); }
      100% { transform: rotate(0deg); }
    }
  </style>

  <!-- Yellow triangle (top / north pointer) — animated -->
  <path class="yellow-tri" d="M16.4535 23.3183L28.6708 4.9923C30.2541 2.61737 33.7439 2.61737 35.3272 4.99231L47.5446 23.3183C49.3167 25.9765 47.4111 29.5371 44.2164 29.5371H32.0062H19.7817C16.5869 29.5371 14.6813 25.9765 16.4535 23.3183Z" fill="#FAEF11" stroke="black"/>

  <!-- White triangle (bottom) -->
  <path d="M47.5436 40.6788L35.3262 59.0048C33.743 61.3797 30.2531 61.3797 28.6698 59.0048L16.4525 40.6788C14.6804 38.0205 16.5859 34.46 19.7807 34.46H31.9908H44.2154C47.4102 34.46 49.3157 38.0205 47.5436 40.6788Z" fill="#CAEBFF" stroke="black"/>

  <!-- White triangle (right) -->
  <path d="M40.6788 16.4535L59.0048 28.6708C61.3797 30.2541 61.3797 33.7439 59.0048 35.3272L40.6788 47.5446C38.0205 49.3167 34.46 47.4111 34.46 44.2164V32.0062V19.7817C34.46 16.5869 38.0205 14.6813 40.6788 16.4535Z" fill="#CAEBFF" stroke="black"/>

  <!-- White triangle (left) -->
  <path d="M23.3183 47.5436L4.9923 35.3262C2.61737 33.743 2.61737 30.2531 4.99231 28.6698L23.3183 16.4525C25.9765 14.6804 29.5371 16.5859 29.5371 19.7807V31.9908V44.2154C29.5371 47.4102 25.9765 49.3157 23.3183 47.5436Z" fill="#CAEBFF" stroke="black"/>

  <!-- Yellow center circle -->
  <circle cx="31.9985" cy="31.9985" r="9.34615" fill="#FAEF11" stroke="black"/>
</svg>
</body>
</html>
